<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub 批量提交工具 - PR 专用版</title>
  
  <!-- 引入 Oat UI 核心文件：负责基础的语义化排版、表格和表单样式 -->
  <link rel="stylesheet" href="https://unpkg.com/@knadh/oat/oat.min.css">
  <script src="https://unpkg.com/@knadh/oat/oat.min.js" defer></script>
  
  <style>
    body {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    /* --------------------------------------
       布局与流程式向导 (Wizard) 样式
    -------------------------------------- */
    .step-container {
      display: none;
      animation: fadeIn 0.4s ease-out forwards;
    }
    .step-container.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stepper {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      position: relative;
    }
    .stepper::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      background: #e2e8f0;
      z-index: -1;
    }
    .step-item {
      background: #fff;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      border: 2px solid #e2e8f0;
      font-weight: bold;
      color: #94a3b8;
      transition: all 0.3s;
    }
    .step-item.active {
      border-color: #7b52b9;
      color: #7b52b9;
      box-shadow: 0 0 12px rgba(123,82,185,0.15);
    }
    @media (prefers-color-scheme: dark) {
      .stepper::before { background: #333; }
      .step-item { background: #1a1a1a; border-color: #333; color: #666; }
      .step-item.active { border-color: #c8b6ff; color: #c8b6ff; background: #2d2440; }
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
    }
    .actions-bar { margin: 1.5rem 0; display: flex; gap: 1rem; }
    td input { margin: 0; width: 100%; min-width: 150px; }

    /* --------------------------------------
       Galaxy UI 组件集 (From uiverse-io/galaxy)
    -------------------------------------- */

    /* Galaxy Component 1: 科技感导航下一步按钮 */
    .galaxy-btn-next {
      background: #000;
      color: white;
      font-family: inherit;
      padding: 0.35em 1.2em 0.35em 1.2em;
      font-size: 16px;
      font-weight: 500;
      border-radius: 0.9em;
      border: none;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      box-shadow: inset 0 0 1.6em -0.6em #714da6;
      overflow: hidden;
      position: relative;
      height: 2.8em;
      padding-right: 3.3em;
      cursor: pointer;
      transition: all 0.3s;
    }
    .galaxy-btn-next .icon {
      background: white;
      margin-left: 1em;
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 2.2em;
      width: 2.2em;
      border-radius: 0.7em;
      box-shadow: 0.1em 0.1em 0.6em 0.2em #7b52b9;
      right: 0.3em;
      transition: all 0.3s;
    }
    .galaxy-btn-next:hover .icon { width: calc(100% - 0.6em); }
    .galaxy-btn-next .icon svg {
      width: 1.1em;
      transition: transform 0.3s;
      color: #7b52b9;
    }
    .galaxy-btn-next:hover .icon svg { transform: translateX(0.1em); }
    
    /* Galaxy Component 2: 返回/次级操作按钮 */
    .galaxy-btn-outline {
      padding: 0.7em 2em;
      background: transparent;
      color: #64748b;
      border: 1px solid #cbd5e1;
      border-radius: 0.6em;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .galaxy-btn-outline:hover {
      border-color: #94a3b8;
      background: #f1f5f9;
    }
    @media (prefers-color-scheme: dark) {
      .galaxy-btn-outline { border-color: #444; color: #aaa; }
      .galaxy-btn-outline:hover { background: #333; color: #fff; }
    }

    .galaxy-btn-secondary {
      padding: 0.5em 1em;
      background: transparent;
      color: #7b52b9;
      border: 1px solid #7b52b9;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .galaxy-btn-secondary:hover {
      background: #7b52b9;
      color: #fff;
      box-shadow: 0 4px 12px rgba(123, 82, 185, 0.3);
    }

    /* Galaxy Component 3: 最终流光提交按钮 */
    .galaxy-submit {
      --accent: #1BFD9C;
      font-size: 15px;
      padding: 0.7em 2.7em;
      letter-spacing: 0.06em;
      position: relative;
      font-family: inherit;
      border-radius: 0.6em;
      overflow: hidden;
      transition: all 0.3s;
      line-height: 1.4em;
      border: 2px solid var(--accent);
      background: linear-gradient(to right, rgba(27, 253, 156, 0.1) 1%, transparent 40%,transparent 60% , rgba(27, 253, 156, 0.1) 100%);
      color: var(--accent);
      box-shadow: inset 0 0 10px rgba(27, 253, 156, 0.4), 0 0 9px 3px rgba(27, 253, 156, 0.1);
      cursor: pointer;
    }
    .galaxy-submit:hover {
      color: #000;
      background: var(--accent);
      box-shadow: inset 0 0 10px rgba(27, 253, 156, 0.6), 0 0 9px 3px rgba(27, 253, 156, 0.2);
    }

    /* Galaxy Component 4: 科技感加载动画 */
    .loader {
      width: 100px;
      height: 60px;
      position: relative;
    }
    .loader-text {
      position: absolute;
      top: 0;
      padding: 0;
      margin: 0;
      color: #7b52b9;
      animation: text_713 3.5s ease both infinite;
      font-size: .9rem;
      letter-spacing: 1px;
      font-weight: bold;
    }
    .load-inner {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border-bottom: 3px solid #7b52b9;
      border-left: 3px solid #7b52b9;
      animation: base_713 1s linear infinite;
    }
    .load-inner:nth-child(2) {
      border-bottom: 3px solid #C8B6FF;
      border-right: 3px solid #C8B6FF;
      animation: base_713 2s linear infinite;
    }
    @keyframes base_713 { 100% { transform: rotate(360deg); } }
    @keyframes text_713 {
      0% { letter-spacing: 1px; transform: translateX(0px); }
      40% { letter-spacing: 2px; transform: translateX(26px); }
      80% { letter-spacing: 1px; transform: translateX(32px); }
      90% { letter-spacing: 2px; transform: translateX(0px); }
      100% { letter-spacing: 1px; transform: translateX(0px); }
    }

    /* 终端风格日志输出区 */
    .log-container {
      background: #1e1e1e;
      color: #a6accd;
      padding: 1rem;
      border-radius: 8px;
      height: 250px;
      overflow-y: auto;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      white-space: pre-wrap;
      margin-top: 1.5rem;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>GitHub 批量提交工具</h1>
      <p>自动保存配置至本地，提供流程式文件打包与单次 Commit 推送服务。结合 Oat UI 与 Galaxy UI 构建。</p>
    </header>

    <!-- 顶层进度条指示器 -->
    <div class="stepper">
      <div class="step-item active" id="step-ind-1">1. 基础配置</div>
      <div class="step-item" id="step-ind-2">2. 文件选择</div>
      <div class="step-item" id="step-ind-3">3. 提交执行</div>
    </div>

    <!-- 步骤一：仓库与分支配置 -->
    <section id="step1" class="step-container active">
      <h2>授权与目标设定</h2>
      <p style="color: gray; font-size: 0.9em;">提示：您的所有配置信息仅保存在本地浏览器缓存中，不会经过任何第三方服务器。</p>
      <form onsubmit="event.preventDefault(); goToStep(2);">
        <fieldset>
          <label>访问令牌 (GitHub Token)</label>
          <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" required oninput="saveConfig()">
          
          <label>目标仓库信息</label>
          <div class="input-group">
            <input type="text" id="owner" placeholder="用户名 (OWNER)" required oninput="saveConfig()">
            <input type="text" id="repo" placeholder="仓库名 (REPO)" required oninput="saveConfig()">
          </div>

          <label>目标分支</label>
          <input type="text" id="branch" placeholder="main" value="main" required oninput="saveConfig()">
        </fieldset>
        
        <div class="nav-buttons" style="justify-content: flex-end;">
          <button type="submit" class="galaxy-btn-next">
            下一步
            <div class="icon">
              <svg height="24" width="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 0h24v24H0z" fill="none"></path>
                <path d="M16.172 11l-5.364-5.364 1.414-1.414L20 12l-7.778 7.778-1.414-1.414L16.172 13H4v-2z" fill="currentColor"></path>
              </svg>
            </div>
          </button>
        </div>
      </form>
    </section>

    <!-- 步骤二：准备上传的文件 -->
    <section id="step2" class="step-container">
      <h2>选择提交内容</h2>
      <p>支持多选文件或整体载入文件夹，可直接在表格内修改目标路径。</p>
      
      <fieldset>
        <label>Commit 提交信息</label>
        <input type="text" id="commit-msg" placeholder="feat: 批量更新" value="feat: " oninput="saveConfig()">
        
        <label>默认基础路径 (选填，如 src/main/，不填则传至根目录)</label>
        <input type="text" id="base-path" placeholder="" oninput="saveConfig()">
      </fieldset>

      <div class="actions-bar">
        <input type="file" id="fileInput" multiple style="display: none;" onchange="handleFileSelect(event)">
        <button class="galaxy-btn-secondary" onclick="document.getElementById('fileInput').click()">添加文件</button>
        
        <input type="file" id="folderInput" webkitdirectory directory multiple style="display: none;" onchange="handleFileSelect(event)">
        <button class="galaxy-btn-secondary" onclick="document.getElementById('folderInput').click()">添加文件夹</button>
        
        <button class="galaxy-btn-secondary" style="color: #e11d48; border-color: #e11d48;" onclick="clearFiles()">清空列表</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>本地文件名称</th>
            <th>文件大小</th>
            <th style="width: 50%;">仓库目标路径</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="file-list">
          <tr id="empty-row">
            <td colspan="4" style="text-align: center; color: gray;">暂未选择任何文件</td>
          </tr>
        </tbody>
      </table>

      <div class="nav-buttons">
        <button class="galaxy-btn-outline" onclick="goToStep(1)">返回上一步</button>
        <button class="galaxy-submit" onclick="prepareUpload()">确认并开始提交</button>
      </div>
    </section>

    <!-- 步骤三：执行提交 -->
    <section id="step3" class="step-container">
      <h2>任务执行情况</h2>
      
      <div id="loader-container" style="display: flex; justify-content: center; margin: 2.5rem 0;">
        <div class="loader">
          <div class="load-inner"></div>
          <div class="load-inner"></div>
          <p class="loader-text">UPLOADING</p>
        </div>
      </div>
      
      <progress id="progress" value="0" max="100"></progress>
      
      <div id="log" class="log-container">系统准备就绪，等待执行指令...</div>
      
      <div class="nav-buttons" id="step3-nav" style="display: none;">
        <button class="galaxy-btn-outline" onclick="goToStep(2)">返回文件修改</button>
        <button class="galaxy-btn-next" style="background: #1e1e1e;" onclick="window.location.reload()">重新启动工具</button>
      </div>
    </section>
  </main>

  <script>
    // 配置缓存与状态数据
    const CONFIG_KEYS =['token', 'owner', 'repo', 'branch', 'commit-msg', 'base-path'];
    let selectedFiles =[];

    // 初始化时载入本地持久化数据
    document.addEventListener('DOMContentLoaded', () => {
      CONFIG_KEYS.forEach(key => {
        const val = localStorage.getItem('gh_tool_' + key);
        if (val) {
          const el = document.getElementById(key);
          if (el) el.value = val;
        }
      });
    });

    // 保存配置至本地
    function saveConfig() {
      CONFIG_KEYS.forEach(key => {
        const el = document.getElementById(key);
        if (el) localStorage.setItem('gh_tool_' + key, el.value);
      });
    }

    // 格式化文件大小
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      else if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      else return (bytes / 1048576).toFixed(2) + ' MB';
    }

    // 统一提示方式
    function notify(msg) {
      if (window.ot && window.ot.toast) window.ot.toast(msg, '系统提示');
      else alert(msg);
    }

    // 处理流程式步骤跳转与合法性校验
    function goToStep(step) {
      // 从步骤1到2的校验
      if (step === 2) {
        const token = document.getElementById('token').value.trim();
        const owner = document.getElementById('owner').value.trim();
        const repo = document.getElementById('repo').value.trim();
        const branch = document.getElementById('branch').value.trim();
        if (!token || !owner || !repo || !branch) {
          notify('请填写完整的仓库与授权信息后继续。');
          return;
        }
        saveConfig();
      }
      
      // 样式切换
      document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.step-item').forEach(el => el.classList.remove('active'));
      
      document.getElementById('step' + step).classList.add('active');
      document.getElementById('step-ind-' + step).classList.add('active');
    }

    // 处理文件选择逻辑
    function handleFileSelect(event) {
      const files = event.target.files;
      if (files.length === 0) return;

      const tbody = document.getElementById('file-list');
      const emptyRow = document.getElementById('empty-row');
      if (emptyRow) emptyRow.remove();

      let basePath = document.getElementById('base-path').value.trim();
      if (basePath && !basePath.endsWith('/')) basePath += '/';

      for (let file of files) {
        let relativePath = file.webkitRelativePath || file.name;
        let targetPath = (basePath + relativePath).replace(/^\/+/, '');

        if (selectedFiles.some(f => f && f.targetPath === targetPath)) continue;

        selectedFiles.push({ file: file, targetPath: targetPath });
        const index = selectedFiles.length - 1;

        let tr = document.createElement('tr');
        tr.innerHTML = `
          <td><small>${file.name}</small></td>
          <td><small>${formatSize(file.size)}</small></td>
          <td><input type="text" value="${targetPath}" onchange="updateTargetPath(${index}, this.value)"></td>
          <td><button type="button" class="galaxy-btn-secondary" style="color: #64748b; border-color: #cbd5e1; padding: 0.3em 0.8em;" onclick="removeFile(${index}, this)">移除</button></td>
        `;
        tbody.appendChild(tr);
      }
      event.target.value = ''; // 允许重复同名文件选取事件
    }

    // 更新文件目标路径
    function updateTargetPath(index, value) {
      if (selectedFiles[index]) selectedFiles[index].targetPath = value;
    }

    // 移除单个文件
    function removeFile(index, btn) {
      selectedFiles[index] = null; 
      btn.closest('tr').remove();
      if (selectedFiles.filter(f => f !== null).length === 0) {
        clearFiles();
      }
    }

    // 清空文件列表
    function clearFiles() {
      selectedFiles =[];
      document.getElementById('file-list').innerHTML = `
        <tr id="empty-row">
          <td colspan="4" style="text-align: center; color: gray;">暂未选择任何文件</td>
        </tr>
      `;
    }

    // 上传前的校验拦截
    function prepareUpload() {
      const msg = document.getElementById('commit-msg').value.trim();
      const validFiles = selectedFiles.filter(f => f !== null);
      
      if (!msg) {
        notify('提交信息不可为空。');
        return;
      }
      if (validFiles.length === 0) {
        notify('请至少添加一个需要上传的文件。');
        return;
      }
      
      saveConfig();
      goToStep(3);
      startUpload(validFiles);
    }

    // 核心执行逻辑
    async function startUpload(filesToUpload) {
      const token = document.getElementById('token').value.trim();
      const owner = document.getElementById('owner').value.trim();
      const repo = document.getElementById('repo').value.trim();
      const branch = document.getElementById('branch').value.trim();
      const commitMsg = document.getElementById('commit-msg').value.trim();

      const logEl = document.getElementById('log');
      logEl.textContent = '开始执行批量提交任务...\n';
      const log = (msg) => {
        logEl.textContent += msg + '\n';
        logEl.scrollTop = logEl.scrollHeight;
      };
      
      const progress = document.getElementById('progress');
      progress.max = filesToUpload.length + 4; 
      progress.value = 0;

      // 调整UI状态
      document.getElementById('step3-nav').style.display = 'none';
      document.getElementById('loader-container').style.display = 'flex';

      const headers = {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json'
      };
      
      try {
        log(`[1/5] 正在拉取远程分支 ${branch} 的最新快照...`);
        let res = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs/heads/${branch}`, { headers });
        if (!res.ok) throw new Error(`无法获取分支信息: ${res.status}`);
        let data = await res.json();
        const baseSha = data.object.sha;
        log(`      最新 Commit SHA: ${baseSha.substring(0,8)}`);
        progress.value++;

        const treeList = [];
        log(`[2/5] 开始上传文件区块 (${filesToUpload.length}项)...`);
        for (let i = 0; i < filesToUpload.length; i++) {
          const fileObj = filesToUpload[i];
          log(`      处理 -> ${fileObj.targetPath}`);
          
          const base64Content = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = e => resolve(e.target.result.split(',')[1]);
            reader.onerror = e => reject(e);
            reader.readAsDataURL(fileObj.file);
          });

          res = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/blobs`, {
            method: 'POST',
            headers,
            body: JSON.stringify({ content: base64Content, encoding: 'base64' })
          });
          if (!res.ok) throw new Error(`文件区块上传失败: ${fileObj.file.name}`);
          data = await res.json();
          
          treeList.push({
            path: fileObj.targetPath,
            mode: '100644',
            type: 'blob',
            sha: data.sha
          });
          progress.value++;
        }

        log('[3/5] 构建全局文件拓扑树 (Tree)...');
        res = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/trees`, {
          method: 'POST',
          headers,
          body: JSON.stringify({ base_tree: baseSha, tree: treeList })
        });
        if (!res.ok) throw new Error('生成拓扑树失败');
        data = await res.json();
        const treeSha = data.sha;
        progress.value++;

        log('[4/5] 正在打包单次组合 Commit...');
        res = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/commits`, {
          method: 'POST',
          headers,
          body: JSON.stringify({ message: commitMsg, tree: treeSha, parents: [baseSha] })
        });
        if (!res.ok) throw new Error('打包 Commit 失败');
        data = await res.json();
        const commitSha = data.sha;
        progress.value++;

        log('[5/5] 同步更新远程分支指针...');
        res = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs/heads/${branch}`, {
          method: 'PATCH',
          headers,
          body: JSON.stringify({ sha: commitSha, force: false })
        });
        if (!res.ok) throw new Error('分支指针同步失败，可能存在代码冲突');
        
        log('\n所有操作已成功完成！文件已被合并到单个 Commit。');
        progress.value++;
        notify('提交成功完成。');
        
      } catch (err) {
        log(`\n终止任务，发生异常: ${err.message}`);
        notify('提交意外中断，请检查上方日志。');
      } finally {
        // 完成后隐藏动画，展示返回操作按钮
        document.getElementById('loader-container').style.display = 'none';
        document.getElementById('step3-nav').style.display = 'flex';
      }
    }
  </script>
</body>
</html>
